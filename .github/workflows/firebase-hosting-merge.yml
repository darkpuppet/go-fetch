# Deploy hosting, Firestore rules/indexes, and Cloud Functions on merge to main.
# Requires GitHub secrets: FIREBASE_SERVICE_ACCOUNT_GO_FETCH_APP_2021_01 and VITE_* (see .env.example).

name: Deploy to Firebase on merge
on:
  push:
    branches:
      - main

concurrency:
  group: firebase-deploy-main
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix functions

      - name: Build PWA
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}

      - name: Build Cloud Functions
        run: npm run functions:build

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GO_FETCH_APP_2021_01 }}

      - name: Deploy hosting, Firestore, and Cloud Functions
        run: >
          npx firebase-tools@latest deploy
          --only hosting,firestore,functions
          --project go-fetch-app-2021-01
          --non-interactive
